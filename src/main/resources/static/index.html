<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Stock API 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

  /* 레이아웃 */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 300px; background: #1e293b; color: #e2e8f0; padding: 20px; flex-shrink: 0; }
  .main { flex: 1; padding: 24px; overflow-y: auto; }

  /* 사이드바 */
  .sidebar h2 { font-size: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .sidebar section { margin-bottom: 28px; }
  .token-box { background: #0f172a; border-radius: 6px; padding: 10px; font-size: 11px; word-break: break-all; color: #4ade80; min-height: 40px; max-height: 80px; overflow: hidden; }
  .user-info { font-size: 13px; color: #94a3b8; margin-top: 8px; }
  .user-info strong { color: #e2e8f0; }

  /* 공통 */
  label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 4px; margin-top: 10px; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background: #fff; }
  .sidebar input, .sidebar select { background: #0f172a; border-color: #334155; color: #e2e8f0; }
  .sidebar input::placeholder { color: #475569; }
  button { cursor: pointer; border: none; border-radius: 6px; padding: 9px 16px; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  button:hover { opacity: .85; }
  .btn-primary  { background: #3b82f6; color: #fff; }
  .btn-success  { background: #22c55e; color: #fff; }
  .btn-warning  { background: #f59e0b; color: #fff; }
  .btn-danger   { background: #ef4444; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-full { width: 100%; margin-top: 10px; }

  /* 카드 */
  .card { background: #fff; border-radius: 10px; padding: 22px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }

  /* 폼 그리드 */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f8fafc; text-align: left; padding: 10px 12px; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-sector { background: #dbeafe; color: #1d4ed8; }
  .badge-exchange { background: #dcfce7; color: #15803d; }

  /* 응답 패널 */
  .response-panel { background: #0f172a; color: #4ade80; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 220px; overflow-y: auto; margin-top: 12px; }

  /* 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal-footer { margin-top: 18px; display: flex; gap: 10px; justify-content: flex-end; }

  /* 알림 토스트 */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; }

  /* 자동완성 드롭다운 */
  .autocomplete-wrap { position: relative; }
  .ac-dropdown { position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 60;
    background: #fff; border: 1px solid #cbd5e1; border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); max-height: 210px; overflow-y: auto; display: none; }
  .ac-dropdown.open { display: block; }
  .ac-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: #eff6ff; }
  .ac-name { font-size: 13px; font-weight: 600; color: #1e293b; }
  .ac-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
  .ac-empty { padding: 12px; text-align: center; color: #94a3b8; font-size: 12px; }
</style>
</head>
<body>

<div class="layout">
  <!-- ── 사이드바 ── -->
  <aside class="sidebar">
    <div style="font-size:20px;font-weight:700;margin-bottom:24px;color:#fff;">📈 Stock API Tester</div>

    <!-- 회원가입 -->
    <section>
      <h2>회원가입</h2>
      <label>이름</label><input id="reg-name" placeholder="홍길동">
      <label>이메일</label><input id="reg-email" type="email" placeholder="user@example.com">
      <label>비밀번호</label><input id="reg-pw" type="password" placeholder="****">
      <button class="btn-success btn-full" onclick="register()">가입하기</button>
    </section>

    <!-- 로그인 -->
    <section>
      <h2>로그인</h2>
      <label>이메일</label><input id="login-email" type="email" placeholder="user@example.com">
      <label>비밀번호</label><input id="login-pw" type="password" placeholder="****">
      <button class="btn-primary btn-full" onclick="login()">로그인</button>
    </section>

    <!-- 토큰 상태 -->
    <section>
      <h2>JWT 토큰</h2>
      <div class="token-box" id="token-display">토큰 없음</div>
      <div class="user-info" id="user-info" style="margin-top:8px;"></div>
      <button class="btn-danger btn-full" style="margin-top:10px;font-size:12px;" onclick="logout()">로그아웃</button>
    </section>
  </aside>

  <!-- ── 메인 ── -->
  <main class="main">

    <!-- 종목 추가 -->
    <div class="card">
      <h3>➕ 종목 추가</h3>
      <div class="form-grid">
        <div>
          <label>종목명 *</label>
          <div class="autocomplete-wrap">
            <input id="s-name" placeholder="삼성전자" autocomplete="off">
            <div class="ac-dropdown" id="name-dropdown"></div>
          </div>
        </div>
        <div>
          <label>종목코드 *</label>
          <input id="s-code" placeholder="005930">
        </div>
        <div>
          <label>섹터</label>
          <select id="s-sector">
            <option value="">— 선택 안 함 —</option>
            <option value="ENERGY">에너지</option>
            <option value="MATERIALS">소재</option>
            <option value="INDUSTRIALS">산업재</option>
            <option value="CONSUMER_DISCRETIONARY">경기소비재</option>
            <option value="CONSUMER_STAPLES">필수소비재</option>
            <option value="HEALTHCARE">헬스케어</option>
            <option value="FINANCIALS">금융</option>
            <option value="IT">IT</option>
            <option value="COMMUNICATION">커뮤니케이션</option>
            <option value="UTILITIES">유틸리티</option>
            <option value="REAL_ESTATE">부동산</option>
          </select>
        </div>
        <div>
          <label>거래소</label>
          <select id="s-exchange">
            <option value="KRX">KRX (KOSPI)</option>
            <option value="KOSDAQ">KOSDAQ</option>
            <option value="NASDAQ">NASDAQ</option>
            <option value="NYSE">NYSE</option>
          </select>
        </div>
        <div>
          <label>보유 수량</label>
          <input id="s-qty" type="number" value="0" min="0">
        </div>
        <div>
          <label>평균 단가</label>
          <input id="s-price" type="number" value="0" min="0">
        </div>
      </div>
      <button class="btn-primary" style="margin-top:14px;" onclick="createStock()">종목 추가</button>
      <div class="response-panel" id="res-create">응답이 여기에 표시됩니다</div>
    </div>

    <!-- 종목 목록 -->
    <div class="card">
      <h3>📋 내 종목 목록 <button class="btn-primary btn-sm" style="float:right;" onclick="loadStocks()">새로고침</button></h3>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>종목명</th><th>코드</th><th>섹터</th><th>거래소</th>
              <th>수량</th><th>평균단가</th><th>전일종가</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="stock-table-body">
            <tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">로그인 후 조회하세요</td></tr>
          </tbody>
        </table>
      </div>
    </div>


  </main>
</div>

<!-- ── 종목 수정 모달 ── -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ 종목 수정</h3>
    <input type="hidden" id="edit-id">
    <label>종목명</label><input id="edit-name">
    <label>섹터</label>
    <select id="edit-sector">
      <option value="">— 선택 안 함 —</option>
      <option value="ENERGY">에너지</option>
      <option value="MATERIALS">소재</option>
      <option value="INDUSTRIALS">산업재</option>
      <option value="CONSUMER_DISCRETIONARY">경기소비재</option>
      <option value="CONSUMER_STAPLES">필수소비재</option>
      <option value="HEALTHCARE">헬스케어</option>
      <option value="FINANCIALS">금융</option>
      <option value="IT">IT</option>
      <option value="COMMUNICATION">커뮤니케이션</option>
      <option value="UTILITIES">유틸리티</option>
      <option value="REAL_ESTATE">부동산</option>
    </select>
    <label>보유 수량</label><input id="edit-qty" type="number" min="0">
    <label>평균 단가</label><input id="edit-price" type="number" min="0">
    <div class="modal-footer">
      <button class="btn-danger" onclick="closeModal()">취소</button>
      <button class="btn-success" onclick="updateStock()">저장</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
const BASE = 'http://localhost:8080';
let token = localStorage.getItem('token') || '';
let currentUser = JSON.parse(localStorage.getItem('user') || 'null');

// ── 초기화 ──────────────────────────────────────────────
window.onload = () => {
  refreshTokenUI();
  if (token) loadStocks();
};

function refreshTokenUI() {
  const el = document.getElementById('token-display');
  const ui = document.getElementById('user-info');
  if (token) {
    el.textContent = token;
    ui.innerHTML = currentUser
      ? `<strong>${currentUser.name}</strong> (${currentUser.email})`
      : '';
  } else {
    el.textContent = '토큰 없음';
    ui.textContent = '';
  }
}

function saveAuth(data) {
  token = data.token;
  currentUser = { name: data.name, email: data.email, userId: data.userId };
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(currentUser));
  refreshTokenUI();
}

function logout() {
  token = '';
  currentUser = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  refreshTokenUI();
  document.getElementById('stock-table-body').innerHTML =
    '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">로그인 후 조회하세요</td></tr>';
  toast('로그아웃 되었습니다');
}

// ── HTTP 유틸 ────────────────────────────────────────────
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(BASE + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function fmt(obj) { return JSON.stringify(obj, null, 2); }

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#dc2626' : '#1e293b';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── 인증 ────────────────────────────────────────────────
async function register() {
  const body = {
    name:     document.getElementById('reg-name').value,
    email:    document.getElementById('reg-email').value,
    password: document.getElementById('reg-pw').value
  };
  const res = await api('POST', '/api/auth/register', body);
  if (res.success) { saveAuth(res.data); toast('회원가입 완료! 자동 로그인됨'); }
  else toast(res.message, true);
}

async function login() {
  const body = {
    email:    document.getElementById('login-email').value,
    password: document.getElementById('login-pw').value
  };
  const res = await api('POST', '/api/auth/login', body);
  if (res.success) {
    saveAuth(res.data);
    toast('로그인 성공');
    loadStocks();
  } else toast(res.message, true);
}

// ── 종목 ────────────────────────────────────────────────
async function createStock() {
  const sector = document.getElementById('s-sector').value;
  const body = {
    stockName: document.getElementById('s-name').value,
    stockCode: document.getElementById('s-code').value,
    exchange:  document.getElementById('s-exchange').value,
    quantity:  parseInt(document.getElementById('s-qty').value) || 0,
    avgPrice:  parseFloat(document.getElementById('s-price').value) || 0
  };
  if (sector) body.sector = sector;
  const res = await api('POST', '/api/v1/stocks', body);
  document.getElementById('res-create').textContent = fmt(res);
  if (res.success) { toast('종목 추가 완료'); loadStocks(); }
  else toast(res.message, true);
}

async function loadStocks() {
  if (!token) return;
  const res = await api('GET', '/api/v1/stocks');
  const tbody = document.getElementById('stock-table-body');
  if (!res.success || !res.data || res.data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">종목이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = res.data.map(s => `
    <tr>
      <td>${s.id}</td>
      <td><strong>${s.stockName}</strong></td>
      <td><code>${s.stockCode}</code></td>
      <td>${s.sectorLabel ? `<span class="badge badge-sector">${s.sectorLabel}</span>` : '—'}</td>
      <td><span class="badge badge-exchange">${s.exchange || '—'}</span></td>
      <td>${s.quantity.toLocaleString()}</td>
      <td>${s.avgPrice ? Number(s.avgPrice).toLocaleString() : '—'}</td>
      <td>${s.previousClose && s.previousClose > 0 ? Number(s.previousClose).toLocaleString() : '—'}</td>
      <td style="white-space:nowrap;">
        <button class="btn-warning btn-sm" onclick="openEdit(${s.id},'${s.stockName}','${s.sectorCode||''}',${s.quantity},${s.avgPrice})">수정</button>
        <button class="btn-danger btn-sm" onclick="deleteStock(${s.id})" style="margin-left:4px;">삭제</button>
      </td>
    </tr>`).join('');
}

async function deleteStock(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const res = await api('DELETE', `/api/v1/stocks/${id}`);
  if (res.success) { toast('삭제 완료'); loadStocks(); }
  else toast(res.message, true);
}

// ── 수정 모달 ────────────────────────────────────────────
function openEdit(id, name, sector, qty, price) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-sector').value = sector;
  document.getElementById('edit-qty').value = qty;
  document.getElementById('edit-price').value = price;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

async function updateStock() {
  const id = document.getElementById('edit-id').value;
  const sector = document.getElementById('edit-sector').value;
  const body = {
    stockName: document.getElementById('edit-name').value,
    quantity:  parseInt(document.getElementById('edit-qty').value),
    avgPrice:  parseFloat(document.getElementById('edit-price').value)
  };
  if (sector) body.sector = sector;
  const res = await api('PATCH', `/api/v1/stocks/${id}`, body);
  if (res.success) { toast('수정 완료'); closeModal(); loadStocks(); }
  else toast(res.message, true);
}

// ── 종목명 자동완성 ──────────────────────────────────────
(function () {
  const nameInput  = document.getElementById('s-name');
  const dropdown   = document.getElementById('name-dropdown');
  let debounceTimer = null;
  let focusedIdx    = -1;
  let lastResults   = [];

  function closeDropdown() {
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
    focusedIdx = -1;
    lastResults = [];
  }

  function renderItems(items) {
    lastResults = items;
    focusedIdx  = -1;
    if (!items.length) {
      dropdown.innerHTML = '<div class="ac-empty">검색 결과가 없습니다</div>';
    } else {
      dropdown.innerHTML = items.map((it, i) => `
        <div class="ac-item" data-idx="${i}">
          <div class="ac-name">${it.stockName}</div>
          <div class="ac-meta">${it.stockCode} &nbsp;·&nbsp; ${it.exchange || ''}</div>
        </div>`).join('');
      dropdown.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault(); // blur 방지
          selectItem(parseInt(el.dataset.idx));
        });
      });
    }
    dropdown.classList.add('open');
  }

  function selectItem(idx) {
    const item = lastResults[idx];
    if (!item) return;
    nameInput.value = item.stockName;
    document.getElementById('s-code').value = item.stockCode || '';
    // 거래소 select 매핑
    const exMap = { KOSPI: 'KRX', KRX: 'KRX', KOSDAQ: 'KOSDAQ', NASDAQ: 'NASDAQ', NYSE: 'NYSE' };
    const exSel = document.getElementById('s-exchange');
    const mapped = exMap[item.exchange] || item.exchange || '';
    if (mapped) exSel.value = mapped;
    closeDropdown();
    // 다음 필드(섹터)로 포커스 이동
    document.getElementById('s-sector').focus();
  }

  async function doSearch(q) {
    if (!token) return;  // 로그인 필요
    try {
      const res = await api('GET', `/api/v1/stocks/search?keyword=${encodeURIComponent(q)}`);
      if (res.success && Array.isArray(res.data)) {
        renderItems(res.data);
      } else {
        closeDropdown();
      }
    } catch (_) { closeDropdown(); }
  }

  nameInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = nameInput.value.trim();
    if (q.length < 2) { closeDropdown(); return; }
    dropdown.innerHTML = '<div class="ac-empty">검색 중…</div>';
    dropdown.classList.add('open');
    debounceTimer = setTimeout(() => doSearch(q), 400);
  });

  // 키보드 탐색 (↑↓ Enter Escape)
  nameInput.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      items[focusedIdx]?.classList.remove('focused');
      focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
      items[focusedIdx]?.classList.add('focused');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      items[focusedIdx]?.classList.remove('focused');
      focusedIdx = Math.max(focusedIdx - 1, 0);
      items[focusedIdx]?.classList.add('focused');
    } else if (e.key === 'Enter' && focusedIdx >= 0) {
      e.preventDefault();
      selectItem(focusedIdx);
    } else if (e.key === 'Escape') {
      closeDropdown();
    }
  });

  // 외부 클릭 시 닫기
  document.addEventListener('click', e => {
    if (!nameInput.contains(e.target) && !dropdown.contains(e.target)) closeDropdown();
  });
})();


// 모달 외부 클릭 닫기
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>

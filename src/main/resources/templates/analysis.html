<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>배당 분석</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Dividend Manager</div>
    <div class="menu">
        <a href="/">대시보드</a>
        <a href="/stocks">종목</a>
        <a href="/transactions">거래</a>
        <a href="/dividends">배당</a>
        <a href="/analysis">분석</a>
    </div>
</div>

<div class="container">

    <div class="page-header">
        <h1>배당 분석</h1>
        <p>연간 목표를 설정하고 월별 배당 흐름을 분석합니다.</p>
    </div>

    <div class="section">
        <h2 class="section-title">연간 목표 설정</h2>

        <form class="form-box" action="/analysis/goal" method="post">
            <input type="number" name="targetDividend" placeholder="연간 목표 배당금">
            <button type="submit" class="btn">목표 저장</button>
        </form>
    </div>

    <div class="card-row">
        <div class="card">
            <h3>목표 배당금</h3>
            <div class="value" th:text="${#numbers.formatInteger(targetDividend, 1, 'COMMA')} + '원'">0원</div>
        </div>

        <div class="card">
            <h3>예상 연 배당금</h3>
            <div class="value" th:text="${#numbers.formatInteger(totalDividend, 1, 'COMMA')} + '원'">0원</div>
        </div>

        <div class="card">
            <h3>달성률</h3>
            <div class="value" th:text="${achievementRate} + '%'">0%</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">월별 배당금</h2>

        <table>
            <thead>
            <tr>
                <th>월</th>
                <th class="text-right">예상 배당금</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="month : ${monthlyDividends}">
                <td th:text="${month.month} + '월'">1월</td>
                <td class="text-right" th:text="${#numbers.formatInteger(month.amount, 1, 'COMMA')} + '원'">0원</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h2 class="section-title">월별 배당금 그래프</h2>
        <canvas id="dividendChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const monthlyDividends = /*[[${monthlyDividends}]]*/ [];

    const labels = monthlyDividends.map(item => item.month + '월');
    const data = monthlyDividends.map(item => item.amount);

    const ctx = document.getElementById('dividendChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '월별 예상 배당금',
                data: data
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dividend Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Dividend Manager</div>
    <div class="menu">
        <a href="/">대시보드</a>
        <a href="/stocks">종목</a>
        <a href="/transactions">거래</a>
        <a href="/dividends">배당</a>
        <a href="/analysis">분석</a>
    </div>
</div>

<div class="container">

    <div class="page-header">
        <h1>대시보드</h1>
        <p>포트폴리오 현황과 월별 배당 예상을 한눈에 확인합니다.</p>
    </div>

    <div class="card-row">
        <div class="card">
            <h3>총 투자금</h3>
            <div class="value" th:text="${#numbers.formatInteger(totalInvestment, 1, 'COMMA')} + '원'">0원</div>
        </div>

        <div class="card">
            <h3>예상 연 배당금</h3>
            <div class="value" th:text="${#numbers.formatInteger(totalDividend, 1, 'COMMA')} + '원'">0원</div>
        </div>

        <div class="card">
            <h3>목표 달성률</h3>
            <div class="value" th:text="${achievementRate} + '%'">0%</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">월별 예상 배당금</h2>
        <canvas id="dividendChart"></canvas>
    </div>

    <div class="section">
        <h2 class="section-title">보유 종목</h2>

        <table>
            <thead>
            <tr>
                <th>종목</th>
                <th class="text-right">수량</th>
                <th class="text-right">평균가</th>
                <th class="text-right">투자금</th>
                <th class="text-right">예상 배당</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${holdings}">
                <td th:text="${h.stockName}">종목명</td>
                <td class="text-right" th:text="${h.quantity}">수량</td>
                <td class="text-right" th:text="${#numbers.formatInteger(h.averagePrice, 1, 'COMMA')}">평균가</td>
                <td class="text-right" th:text="${#numbers.formatInteger(h.totalInvestment, 1, 'COMMA')}">투자금</td>
                <td class="text-right" th:text="${#numbers.formatInteger(h.expectedDividend, 1, 'COMMA')}">예상 배당</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const monthlyDividends = /*[[${monthlyDividends}]]*/ [];

    const labels = monthlyDividends.map(item => item.month + '월');
    const data = monthlyDividends.map(item => item.amount);

    new Chart(document.getElementById('dividendChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '월별 예상 배당금',
                data: data
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>종목 관리</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Dividend Manager</div>
    <div class="menu">
        <a href="/">대시보드</a>
        <a href="/stocks">종목</a>
        <a href="/transactions">거래</a>
        <a href="/dividends">배당</a>
        <a href="/analysis">분석</a>
    </div>
</div>

<div class="container">

<div class="page-header">
    <h1>종목 관리</h1>
    <p>보유 중인 종목을 등록하고 관리합니다.</p>
</div>

<div class="page-layout">

    <div class="main-content">

        <div class="section">
            <h2 class="section-title">종목 추가</h2>
            <form class="form-box" action="/stocks/add" method="post">
                <input type="text" name="stockName" placeholder="종목명">
                <input type="text" name="ticker" placeholder="티커/종목코드">
                <select name="market">
                    <option value="국내">국내</option>
                    <option value="미국">미국</option>
                </select>
                <select name="dividendCycle">
                    <option value="월배당">월배당</option>
                    <option value="분기배당">분기배당</option>
                    <option value="반기배당">반기배당</option>
                    <option value="연배당">연배당</option>
                </select>
                <input type="text" name="sector" placeholder="업종">
                <button type="submit" class="btn">저장</button>
            </form>
        </div>

        <div class="section">
            <h2 class="section-title">종목 목록</h2>
            <table>
                <thead>
                <tr>
                    <th>종목명</th>
                    <th>티커</th>
                    <th>시장</th>
                    <th>업종</th>
                    <th>배당주기</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stock : ${stocks}">
                    <td th:text="${stock.stockName}">삼성전자</td>
                    <td th:text="${stock.ticker}">005930</td>
                    <td th:text="${stock.market}">국내</td>
                    <td th:text="${stock.sector}">제조</td>
                    <td th:text="${stock.dividendCycle}">분기배당</td>
                    <td>
                        <button type="button" class="btn btn-warning btn-small"
                                th:data-id="${stock.id}"
                                th:data-stockname="${stock.stockName}"
                                th:data-ticker="${stock.ticker}"
                                th:data-market="${stock.market}"
                                th:data-sector="${stock.sector}"
                                th:data-dividendcycle="${stock.dividendCycle}"
                                onclick="openEdit(this)">
                            수정
                        </button>
                        <a th:href="@{/stocks/delete/{id}(id=${stock.id})}"
                           class="btn btn-danger btn-small"
                           onclick="return confirm('종목을 삭제하시겠습니까?')">
                            삭제
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

    <div class="edit-panel" id="editPanel" style="display:none">
        <div class="edit-panel-header">
            <h3>종목 수정</h3>
            <button type="button" class="edit-panel-close" onclick="document.getElementById('editPanel').style.display='none'">&#x2715;</button>
        </div>
        <form class="form-box" action="/stocks/update" method="post">
            <input type="hidden" name="id" id="editId">
            <input type="text" name="stockName" id="editStockName" placeholder="종목명" required>
            <input type="text" name="ticker" id="editTicker" placeholder="티커/종목코드" required>
            <select name="market" id="editMarket">
                <option value="국내">국내</option>
                <option value="미국">미국</option>
            </select>
            <select name="dividendCycle" id="editDividendCycle">
                <option value="월배당">월배당</option>
                <option value="분기배당">분기배당</option>
                <option value="반기배당">반기배당</option>
                <option value="연배당">연배당</option>
            </select>
            <input type="text" name="sector" id="editSector" placeholder="업종" required>
            <button type="submit" class="btn">수정 저장</button>
        </form>
    </div>

</div>
</div>

<script>
    function openEdit(btn) {
        document.getElementById('editId').value = btn.dataset.id;
        document.getElementById('editStockName').value = btn.dataset.stockname;
        document.getElementById('editTicker').value = btn.dataset.ticker;
        document.getElementById('editMarket').value = btn.dataset.market;
        document.getElementById('editSector').value = btn.dataset.sector;
        document.getElementById('editDividendCycle').value = btn.dataset.dividendcycle;
        document.getElementById('editPanel').style.display = 'block';
    }
</script>

</body>
</html>

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dividend?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
  expiration: 86400000

stock:
  search:
    python-server-url: ${STOCK_SEARCH_URL:http://localhost:5000}
    timeout-seconds: 3
  schedule:
    price-update-cron: ${PRICE_UPDATE_CRON:0 0 18 * * *}
